<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Accessible Image Gallery</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f4f4;
        }

        h1 {
            margin-top: 20px;
        }

        #preview {
            width: 400px;
            height: 250px;
            margin: 20px auto;
            border: 3px solid black;
            line-height: 250px;
            background-size: cover;
            background-position: center;
            background-color: #ddd;
            font-weight: bold;
        }

        .gallery img {
            width: 120px;
            height: 80px;
            margin: 10px;
            border: 2px solid black;
            cursor: pointer;
        }

        .gallery img:focus {
            outline: 4px solid blue;
        }
    </style>
</head>

<body onload="addTabFocus()">

<h1>Accessible Image Gallery</h1>

<div id="preview">
    Di chuột hoặc dùng bàn phím để xem ảnh.
</div>

<div class="gallery">
    <img src="https://picsum.photos/id/1015/400/250"
         alt="Cảnh núi đẹp"
         onmouseover="upDate(this)"
         onmouseout="unDo()"
         onfocus="upDate(this)"
         onblur="unDo()">

    <img src="https://picsum.photos/id/1025/400/250"
         alt="Chú chó đáng yêu"
         onmouseover="upDate(this)"
         onmouseout="unDo()"
         onfocus="upDate(this)"
         onblur="unDo()">

    <img src="https://picsum.photos/id/1035/400/250"
         alt="Bãi biển xanh"
         onmouseover="upDate(this)"
         onmouseout="unDo()"
         onfocus="upDate(this)"
         onblur="unDo()">

    <img src="https://picsum.photos/id/1045/400/250"
         alt="Khu rừng yên tĩnh"
         onmouseover="upDate(this)"
         onmouseout="unDo()"
         onfocus="upDate(this)"
         onblur="unDo()">

    <img src="https://picsum.photos/id/1055/400/250"
         alt="Thành phố về đêm"
         onmouseover="upDate(this)"
         onmouseout="unDo()"
         onfocus="upDate(this)"
         onblur="unDo()">

    <img src="https://picsum.photos/id/1065/400/250"
         alt="Hoàng hôn đẹp"
         onmouseover="upDate(this)"
         onmouseout="unDo()"
         onfocus="upDate(this)"
         onblur="unDo()">
</div>

<script>
    function upDate(previewPic) {
        console.log("Hover hoặc Focus hoạt động");
        console.log("Alt:", previewPic.alt);
        console.log("Src:", previewPic.src);

        document.getElementById("preview").innerHTML = previewPic.alt;
        document.getElementById("preview").style.backgroundImage =
            "url('" + previewPic.src + "')";
    }

    function unDo() {
        document.getElementById("preview").innerHTML =
            "Di chuột hoặc dùng bàn phím để xem ảnh.";
        document.getElementById("preview").style.backgroundImage = "url('')";
    }

    function addTabFocus() {
        console.log("Trang đã load");

        let images = document.querySelectorAll(".gallery img");

        for (let i = 0; i < images.length; i++) {
            images[i].setAttribute("tabindex", "0");
            console.log("Added tabindex to image", i);
        }
    }
</script>

</body>
</html>
